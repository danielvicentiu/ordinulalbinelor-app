<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6c14a"/>
      <stop offset="100%" style="stop-color:#9a7a14"/>
    </linearGradient>
  </defs>
  <!-- Hexagon pointy-top -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="url(#hexGrad)" stroke="#9a7a14" stroke-width="0.5"/>
  <!-- Bee body -->
  <ellipse cx="16" cy="17" rx="4" ry="5" fill="#2d1b0e"/>
  <!-- Bee stripes -->
  <rect x="12" y="14.5" width="8" height="1.5" rx="0.5" fill="#c9a227"/>
  <rect x="12" y="17" width="8" height="1.5" rx="0.5" fill="#c9a227"/>
  <!-- Wings -->
  <ellipse cx="11" cy="14" rx="3.5" ry="2" fill="white" opacity="0.7"/>
  <ellipse cx="21" cy="14" rx="3.5" ry="2" fill="white" opacity="0.7"/>
  <!-- Head -->
  <circle cx="16" cy="11.5" r="2.5" fill="#2d1b0e"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6ea"/>
      <stop offset="100%" style="stop-color:#f5e9c8"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6c14a"/>
      <stop offset="100%" style="stop-color:#9a7a14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#c9a227" stroke-width="2" rx="8"/>
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#c9a22750" stroke-width="1" rx="6"/>
  <!-- Hexagon -->
  <polygon points="600,80 720,147 720,283 600,350 480,283 480,147" fill="url(#hexGrad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Bee body -->
  <ellipse cx="600" cy="230" rx="28" ry="35" fill="#2d1b0e"/>
  <rect x="572" y="214" width="56" height="10" rx="3" fill="#c9a227"/>
  <rect x="572" y="230" width="56" height="10" rx="3" fill="#c9a227"/>
  <ellipse cx="565" cy="205" rx="24" ry="14" fill="white" opacity="0.6"/>
  <ellipse cx="635" cy="205" rx="24" ry="14" fill="white" opacity="0.6"/>
  <circle cx="600" cy="195" r="17" fill="#2d1b0e"/>
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#2d1b0e">Ordinul Albinelor</text>
  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#5a4220" font-style="italic">Povești pentru copii din Cetatea de Ceară</text>
  <!-- Decorative lines -->
  <line x1="200" y1="455" x2="450" y2="455" stroke="#c9a227" stroke-width="1"/>
  <line x1="750" y1="455" x2="1000" y2="455" stroke="#c9a227" stroke-width="1"/>
</svg>
